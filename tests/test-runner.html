<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova64 Test Suite</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00ff00;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #ff6b35;
            text-shadow: 0 0 10px #ff6b35;
            margin-bottom: 30px;
        }
        
        .test-section {
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            margin: 20px 0;
            padding: 20px;
        }
        
        .test-section h2 {
            color: #00ffff;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        
        .test-result {
            margin: 10px 0;
            padding: 8px;
            border-radius: 4px;
        }
        
        .test-pass {
            background: #003300;
            border-left: 4px solid #00ff00;
        }
        
        .test-fail {
            background: #330000;
            border-left: 4px solid #ff0000;
            color: #ffaaaa;
        }
        
        .test-error {
            background: #331100;
            border-left: 4px solid #ffaa00;
            color: #ffddaa;
        }
        
        .stats {
            background: #001122;
            border: 2px solid #0066cc;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .stats h3 {
            color: #00ccff;
            margin-top: 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff00, #00cc00);
            transition: width 0.3s ease;
        }
        
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        
        button {
            background: #ff6b35;
            color: #fff;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            margin: 0 10px;
            transition: background 0.3s ease;
        }
        
        button:hover {
            background: #ff8555;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .log {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
        }
        
        .performance-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .metric {
            background: #112211;
            border: 1px solid #44aa44;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 24px;
            color: #00ff00;
            font-weight: bold;
        }
        
        .metric-label {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B3RDWLFWVF"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-B3RDWLFWVF');
</script>
</head>
<body>
    <div class="container">
        <h1>🚀 Nova64 Fantasy Console Test Suite</h1>
        
        <div class="controls">
            <button id="runTests" onclick="runTests()">Run All Tests</button>
            <button id="runAPI" onclick="runAPITests()">3D API Tests</button>
            <button id="runScreen" onclick="runScreenTests()">Screen Tests</button>
            <button id="runInput" onclick="runInputTests()">Input Tests</button>
            <button id="runIntegration" onclick="runIntegrationOnlyTests()">Integration Tests</button>
            <button id="clearResults" onclick="clearResults()">Clear Results</button>
        </div>
        
        <div class="stats" id="stats" style="display: none;">
            <h3>📊 Test Results</h3>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div id="statsContent"></div>
        </div>
        
        <div class="performance-metrics" id="performanceMetrics" style="display: none;">
            <div class="metric">
                <div class="metric-value" id="meshCreationTime">-</div>
                <div class="metric-label">Mesh Creation (ms)</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="sceneOpsTime">-</div>
                <div class="metric-label">Scene Operations (ms)</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="transformTime">-</div>
                <div class="metric-label">Transform Operations (ms)</div>
            </div>
        </div>
        
        <div class="test-section" id="testResults" style="display: none;">
            <h2>🧪 Test Results</h2>
            <div id="testOutput"></div>
        </div>
        
        <div class="test-section" id="console" style="display: none;">
            <h2>📝 Console Output</h2>
            <div class="log" id="consoleLog"></div>
        </div>
    </div>

    <script type="module">
        // Import test modules
        import { TestRunner, Assert, Performance, MockGPU } from './test-runner.js';
        import { run3DAPITests } from './test-3d-api.js';
        import { runScreenSystemTests } from './test-screen-system.js';
        import { runIntegrationTests } from './test-integration.js';
        import { runInputSystemTests } from './test-input-system.js';
        
        let testResults = [];
        let consoleOutput = [];
        
        // Override console.log to capture output
        const originalConsoleLog = console.log;
        console.log = function(...args) {
            consoleOutput.push(args.join(' '));
            updateConsoleDisplay();
            originalConsoleLog.apply(console, args);
        };
        
        function updateUI() {
            const stats = document.getElementById('stats');
            const results = document.getElementById('testResults');
            const consoleDiv = document.getElementById('console');
            
            if (testResults.length > 0) {
                stats.style.display = 'block';
                results.style.display = 'block';
                consoleDiv.style.display = 'block';
                
                updateStats();
                updateTestResults();
            }
        }
        
        function updateStats() {
            const total = testResults.length;
            const passed = testResults.filter(t => t.passed).length;
            const failed = total - passed;
            const passRate = total > 0 ? (passed / total * 100).toFixed(1) : 0;
            
            const progressFill = document.getElementById('progressFill');
            const statsContent = document.getElementById('statsContent');
            
            progressFill.style.width = passRate + '%';
            
            statsContent.innerHTML = `
                <p><strong>Total Tests:</strong> ${total}</p>
                <p><strong>✅ Passed:</strong> ${passed}</p>
                <p><strong>❌ Failed:</strong> ${failed}</p>
                <p><strong>📈 Pass Rate:</strong> ${passRate}%</p>
            `;
        }
        
        function updateTestResults() {
            const output = document.getElementById('testOutput');
            output.innerHTML = '';
            
            testResults.forEach(test => {
                const div = document.createElement('div');
                div.className = `test-result ${test.passed ? 'test-pass' : 'test-fail'}`;
                div.innerHTML = `
                    <strong>${test.passed ? '✅' : '❌'} ${test.name}</strong>
                    ${test.error ? `<br><em>${test.error}</em>` : ''}
                    <br><small>Duration: ${test.duration}ms</small>
                `;
                output.appendChild(div);
            });
        }
        
        function updateConsoleDisplay() {
            const consoleLog = document.getElementById('consoleLog');
            consoleLog.textContent = consoleOutput.join('\n');
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }
        
        function updatePerformanceMetrics(metrics) {
            if (!metrics) return;
            
            const performanceDiv = document.getElementById('performanceMetrics');
            performanceDiv.style.display = 'grid';
            
            document.getElementById('meshCreationTime').textContent = 
                metrics.meshCreation ? metrics.meshCreation.toFixed(3) : '-';
            document.getElementById('sceneOpsTime').textContent = 
                metrics.sceneOperations ? metrics.sceneOperations.toFixed(3) : '-';
            document.getElementById('transformTime').textContent = 
                metrics.transformOperations ? metrics.transformOperations.toFixed(3) : '-';
        }
        
        // Individual test suite runners
        async function runAPITests() {
            console.log('🔧 Running 3D API Tests...');
            clearResults();
            
            const button = document.getElementById('runAPI');
            button.disabled = true;
            button.textContent = 'Running...';
            
            try {
                const results = await run3DAPITests();
                testResults = results.tests || [];
                updateUI();
                
                console.log(`✅ 3D API tests completed: ${results.passed}/${results.total} passed`);
            } catch (error) {
                console.error('❌ 3D API test error:', error);
            } finally {
                button.disabled = false;
                button.textContent = '3D API Tests';
            }
        }
        
        async function runScreenTests() {
            console.log('🖥️  Running Screen System Tests...');
            clearResults();
            
            const button = document.getElementById('runScreen');
            button.disabled = true;
            button.textContent = 'Running...';
            
            try {
                const results = await runScreenSystemTests();
                testResults = results.tests || [];
                updateUI();
                
                console.log(`✅ Screen system tests completed: ${results.passed}/${results.total} passed`);
            } catch (error) {
                console.error('❌ Screen system test error:', error);
            } finally {
                button.disabled = false;
                button.textContent = 'Screen Tests';
            }
        }
        
        async function runInputTests() {
            console.log('🎮 Running Input System Tests...');
            clearResults();
            
            const button = document.getElementById('runInput');
            button.disabled = true;
            button.textContent = 'Running...';
            
            try {
                const results = await runInputSystemTests();
                testResults = results.tests || [];
                updateUI();
                
                console.log(`✅ Input system tests completed: ${results.passed}/${results.total} passed`);
            } catch (error) {
                console.error('❌ Input system test error:', error);
            } finally {
                button.disabled = false;
                button.textContent = 'Input Tests';
            }
        }
        
        async function runIntegrationOnlyTests() {
            console.log('🔗 Running Integration Tests...');
            clearResults();
            
            const button = document.getElementById('runIntegration');
            button.disabled = true;
            button.textContent = 'Running...';
            
            try {
                const results = await runIntegrationTests();
                testResults = results.tests || [];
                updateUI();
                
                console.log(`✅ Integration tests completed: ${results.passed}/${results.total} passed`);
            } catch (error) {
                console.error('❌ Integration test error:', error);
            } finally {
                button.disabled = false;
                button.textContent = 'Integration Tests';
            }
        }
        
        // Performance tests
        async function runPerformanceTests() {
            console.log('⚡ Running Performance Tests...');
            
            const mockGPU = new MockGPU();
            
            // Mesh creation performance
            const { average: meshAvg } = await Performance.benchmark('Mesh Creation', () => {
                mockGPU.createMesh({ geometry: 'cube', material: 'basic' });
            }, 100);
            
            // Transform performance
            const mesh = mockGPU.createMesh({ geometry: 'cube', material: 'basic' });
            const { average: transformAvg } = await Performance.benchmark('Transform Operations', () => {
                mockGPU.setPosition(mesh, Math.random(), Math.random(), Math.random());
            }, 1000);
            
            // Scene operations performance
            const { average: sceneAvg } = await Performance.benchmark('Scene Operations', () => {
                const scene = mockGPU.createScene();
                const mesh = mockGPU.createMesh({ geometry: 'cube', material: 'basic' });
                mockGPU.addToScene(scene, mesh);
            }, 50);
            
            return {
                meshCreation: meshAvg,
                transformOperations: transformAvg,
                sceneOperations: sceneAvg
            };
        }
        

        
        // Full test suite
        async function runTests() {
            console.log('🚀 Running Complete Nova64 Test Suite...');
            clearResults();
            
            const button = document.getElementById('runTests');
            button.disabled = true;
            button.textContent = 'Running...';
            
            try {
                let allTests = [];
                
                // Run 3D API tests
                console.log('1️⃣ Running 3D API Tests...');
                const apiResults = await run3DAPITests();
                allTests = allTests.concat(apiResults.tests || []);
                
                // Run Screen System tests
                console.log('2️⃣ Running Screen System Tests...');
                const screenResults = await runScreenSystemTests();
                allTests = allTests.concat(screenResults.tests || []);
                
                // Run Input System tests
                console.log('3️⃣ Running Input System Tests...');
                const inputResults = await runInputSystemTests();
                allTests = allTests.concat(inputResults.tests || []);
                
                // Run Integration tests
                console.log('4️⃣ Running Integration Tests...');
                const integrationResults = await runIntegrationTests();
                allTests = allTests.concat(integrationResults.tests || []);
                
                // Run performance tests
                console.log('5️⃣ Running Performance Tests...');
                const perfMetrics = await runPerformanceTests();
                updatePerformanceMetrics(perfMetrics);
                
                // Combine all results
                testResults = allTests;
                updateUI();
                
                const totalPassed = apiResults.passed + screenResults.passed + inputResults.passed + integrationResults.passed;
                const totalCount = apiResults.total + screenResults.total + inputResults.total + integrationResults.total;
                const totalFailed = totalCount - totalPassed;
                
                console.log(`🏁 Complete test suite finished:`);
                console.log(`   3D API: ${apiResults.passed}/${apiResults.total} passed`);
                console.log(`   Screen System: ${screenResults.passed}/${screenResults.total} passed`);
                console.log(`   Input System: ${inputResults.passed}/${inputResults.total} passed`);
                console.log(`   Integration: ${integrationResults.passed}/${integrationResults.total} passed`);
                console.log(`   TOTAL: ${totalPassed}/${totalCount} passed`);
                
                if (totalFailed === 0) {
                    console.log('🎉 All tests passed! Nova64 is ready for action!');
                } else {
                    console.log(`🔧 ${totalFailed} tests failed. Check the results above.`);
                }
                
            } catch (error) {
                console.error('❌ Test suite error:', error);
                testResults.push({
                    name: 'Test Suite Error',
                    passed: false,
                    error: error.message,
                    duration: 0
                });
                updateUI();
            } finally {
                button.disabled = false;
                button.textContent = 'Run All Tests';
            }
        }
        
        function clearResults() {
            testResults = [];
            consoleOutput = [];
            
            document.getElementById('stats').style.display = 'none';
            document.getElementById('testResults').style.display = 'none';
            document.getElementById('console').style.display = 'none';
            document.getElementById('performanceMetrics').style.display = 'none';
            
            updateConsoleDisplay();
        }
        
        // Make functions globally available
        window.runTests = runTests;
        window.runAPITests = runAPITests;
        window.runScreenTests = runScreenTests;
        window.runInputTests = runInputTests;
        window.runIntegrationOnlyTests = runIntegrationOnlyTests;
        window.clearResults = clearResults;
        
        // Auto-run when page loads
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🎮 Nova64 Complete Test Suite Ready!');
            console.log('Choose from:');
            console.log('  • "Run All Tests" - Complete test suite with performance metrics');
            console.log('  • "3D API Tests" - Test 3D rendering functions');
            console.log('  • "Screen Tests" - Test screen management system');
            console.log('  • "Input Tests" - Test enhanced input system');
            console.log('  • "Integration Tests" - Test system integration and demos');
        });
        
    </script>
</body>
</html>
