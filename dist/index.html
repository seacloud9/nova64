<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nova64 — JS Fantasy Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { 
        --bg: linear-gradient(135deg, #0f1115 0%, #1a1625 50%, #0f1115 100%); 
        --panel: #151822; 
        --text: #dcdfe4; 
        --muted: #99a1b3; 
        --accent: #00ffff;
        --neon: #ff0080;
      }
      html, body {
        background: var(--bg);
        margin: 0;
        height: 100%;
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, sans-serif;
      }
      body {
        background: linear-gradient(135deg, #0f1115 0%, #1a1625 50%, #0f1115 100%);
        background-attachment: fixed;
      }
      .shell { display: grid; grid-template-columns: 1fr 350px; gap: 16px; padding: 16px; height: 100%; box-sizing: border-box; }
      .stage { display: grid; place-items: center; background: radial-gradient(1200px 600px at 50% 0%, #151922 20%, transparent 60%); border-radius: 12px; }
      canvas {
        image-rendering: pixelated; width: 1280px; height: 720px;
        background: #000; border-radius: 8px; outline: 2px solid #00ffff;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.3), 0 0 40px rgba(0, 255, 255, 0.1);
      }
      .panel { 
        background: var(--panel); 
        border: 1px solid #1f2433; 
        border-radius: 12px; 
        padding: 16px; 
        display: grid; 
        gap: 14px;
        box-shadow: 0 4px 20px rgba(0, 255, 255, 0.1);
      }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .row label { font-size: 12px; color: var(--muted); }
      select, button {
        background: #202538; color: var(--text); border: 1px solid #2a324a; border-radius: 8px; padding: 6px 10px; font-size: 14px;
      }
      button { cursor: pointer; }
      button:hover { background: #26304a; }
      .badge { font-size: 12px; color: var(--muted); }
      .hr { height: 1px; background: #222a3b; margin: 6px 0; }
      .stat { font-variant-numeric: tabular-nums; font-size: 12px; }
      .title { 
        font-weight: 700; 
        font-size: 16px; 
        color: var(--accent);
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        border-bottom: 1px solid rgba(0, 255, 255, 0.3);
        padding-bottom: 8px;
        margin-bottom: 4px;
      }
      .footer { font-size: 11px; color: var(--muted); }
    </style>
    <script type="module" crossorigin src="/assets/index-CCk1YlXL.js"></script>
  </head>
  <body>
    <div class="shell">
      <div class="stage">
        <canvas id="screen" width="640" height="360"></canvas>
      </div>
      <div class="panel">
        <div class="title">🎮 NOVA64 3D • Nintendo 64 / PlayStation GPU Console</div>
        <div class="row">
          <label>3D Demo</label>
          <select id="cart">
            <option value="/examples/hello-3d/code.js">👋 Hello 3D World (Basic Demo)</option>
            <option value="/examples/crystal-cathedral-3d/code.js">🏛️ Crystal Cathedral (Ultimate Graphics)</option>
            <option value="/examples/mystical-realm-3d/code.js">🏰 Mystical Realm (Fantasy World)</option>
            <option value="/examples/star-fox-nova-3d/code.js">🚀 Star Fox Nova (Space Combat)</option>
            <option value="/examples/f-zero-nova-3d/code.js">🏁 F-Zero Nova (Racing)</option>
            <option value="/examples/cyberpunk-city-3d/code.js">🌃 Cyberpunk City (Open World)</option>
            <option value="/examples/physics-demo-3d/code.js">⚛️ Physics Lab (Simulation)</option>
            <option value="/examples/shooter-demo-3d/code.js">🔫 Space Shooter (Combat)</option>
            <option value="/examples/strider-demo-3d/code.js">⚔️ Knight Platformer (Adventure)</option>
            <option value="/examples/minecraft-demo/code.js">⛏️ Minecraft Voxel World (Sandbox)</option>
            <option value="/examples/3d-advanced/code.js">🎯 Advanced 3D (Technical)</option>
          </select>
        </div>
        <div class="row">
          <button id="pause">Pause</button><button id="editor">Sprite Editor</button>
          <button id="step">Step</button>
          <button id="shot">Screenshot</button>
        </div>
        <div class="hr"></div>
        <div class="row badge">
          <span>🎮 Three.js GPU • Nintendo 64 / PlayStation Style • Full 3D Acceleration</span>
        </div>
        <div class="row stat">
          <span id="stats">fps: -, update: -, draw: - ms</span>
        </div>
        <div class="footer">Controls: arrows to move, Z/X to act. Built with ❤️</div>
      </div>
    </div>
  </body>
</html>
